server {
    listen 80;
    server_name simond.photo www.simond.photo;
    return 301 https://simond.photo$request_uri;
}

server {
    listen 443 ssl;
    server_name simond.photo www.simond.photo;
    root /var/www/html;
    index index.html;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/simond.photo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simond.photo/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.simond.photo) {
        return 301 https://simond.photo$request_uri;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    location = /cheungchau-plain.html {
        return 404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
